plugins {
    id 'net.fabricmc.fabric-loom' version '1.17.12'
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

def javaVersion = JavaVersion.toVersion(project.javaVersion)

repositories {
    // Our refurbished AdvancedChatCore / AdvancedChatFilters, published locally.
    mavenLocal()
    mavenCentral()
    maven { name = 'FabricMC'; url = 'https://maven.fabricmc.net/' }
    maven {
        name = 'Modrinth'
        url = 'https://api.modrinth.com/maven'
        content { includeGroup 'maven.modrinth' }
    }
    maven { name = 'JitPack'; url = 'https://jitpack.io' }
}

dependencies {
    // 26.x ships unobfuscated — no Yarn/Mojang mappings, Loom does not remap.
    minecraft "com.mojang:minecraft:${project.minecraft_version}"

    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    implementation "maven.modrinth:malilib:${project.malilib_version}"

    // AdvancedChatCore (required) and AdvancedChatFilters (optional integration, loaded only if
    // present at runtime) — both from mavenLocal.
    implementation "io.github.darkkronicle:AdvancedChatCore:${project.advancedchat_version}"
    implementation "io.github.darkkronicle:AdvancedChatFilters:${project.filters_version}"

    // Konstruct (templating) + NightConfig (TOML) — bundled by AdvancedChatCore at runtime, needed
    // here at compile time.
    implementation "com.github.DarkKronicle.Konstruct:core:${project.konstruct_version}"
    implementation "com.electronwill.night-config:core:${project.nightconfig_version}"
    implementation "com.electronwill.night-config:toml:${project.nightconfig_version}"

    compileOnly "org.projectlombok:lombok:${project.lombok_version}"
    annotationProcessor "org.projectlombok:lombok:${project.lombok_version}"
}

processResources {
    inputs.property 'version', project.version

    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding = 'UTF-8'
    it.options.release = Integer.parseInt(project.javaVersion)
}

java {
    sourceCompatibility = javaVersion
    targetCompatibility = javaVersion
    withSourcesJar()
}

jar {
    from 'LICENSE.txt'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}
